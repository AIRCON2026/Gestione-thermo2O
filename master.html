<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pannello Direzione - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div id="login-master-card" class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-6">
            <span class="w-10 h-10 rounded-xl bg-blue-500/10 text-blue-400 flex items-center justify-center mx-auto text-xl mb-3 font-bold">M</span>
            <h2 class="text-xl font-black tracking-tight text-slate-100">DIREZIONE CENTRALE</h2>
        </div>
        <div class="mb-5">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Password Amministratore</label>
            <input type="password" id="pass-master" placeholder="••••••••" class="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl font-mono text-center text-slate-100 focus:border-blue-500 outline-none">
        </div>
        <button onclick="controlloAccessoMaster()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white p-3 rounded-xl font-bold text-sm tracking-wide transition shadow-lg">Sblocca Dashboard</button>
    </div>

    <div id="dashboard-master-content" class="w-full max-w-7xl mx-auto hidden animate-in fade-in duration-300">
        <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">tHermo 2O - DIREZIONE MASTER</h1>
            </div>
            <button onclick="esciMaster()" class="text-xs bg-slate-900 hover:bg-slate-800 text-slate-400 px-3 py-1.5 rounded-lg border border-slate-800 font-semibold transition">Chiudi Sessione</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-slate-900 p-6 rounded-2xl shadow-xl border border-slate-800">
                    <h2 class="text-xl font-bold mb-6">📦 Livelli Magazzino Live</h2>
                    <div id="contenitore-prodotti" class="space-y-3"></div>
                </div>
            </div>
            <div class="space-y-6">
                <div class="bg-slate-900 p-6 rounded-2xl shadow-xl border border-slate-800 h-[280px] flex flex-col">
                    <h2 class="text-lg font-bold mb-3">🔔 Flusso Vendite Agenti</h2>
                    <div id="lista-notifiche" class="flex-1 overflow-y-auto space-y-2 pr-2 text-xs"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CLIENTI -->
    <div id="modal-clienti" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-4xl w-full overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-slate-800 bg-slate-950 flex justify-between items-start">
                <div>
                    <h3 id="modal-nome-prodotto" class="font-bold text-base text-slate-100">Nome Prodotto</h3>
                </div>
                <button onclick="chiudiModal()" class="text-slate-400 hover:text-slate-200 text-xl">&times;</button>
            </div>
            <div class="p-6 max-h-[400px] overflow-y-auto">
                <table id="tabella-clienti" class="w-full text-left text-xs">
                    <thead>
                        <tr class="text-slate-400 border-b border-slate-800">
                            <th class="pb-2 text-center">Spedito</th>
                            <th class="pb-2">Cliente</th>
                            <th class="pb-2 text-center">Qta</th>
                            <th class="pb-2 text-center">Agente</th>
                            <th class="pb-2 text-right">Data</th>
                            <th class="pb-2 text-center">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="lista-clienti-corpo" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let cacheInventario = {};
        let modelloCorrente = ""; 

        // [FUNZIONI DI SISTEMA RIMASTE INVARIATE]
        async function controlloAccessoMaster() {
            const pass = document.getElementById('pass-master').value;
            const risp = await fetch('/api/master/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pass }) });
            if(risp.ok) { localStorage.setItem('master_autenticato', 'true'); sbloccaSchermataVisiva(); } else { alert("Chiave errata."); }
        }

        function sbloccaSchermataVisiva() {
            document.getElementById('login-master-card').classList.add('hidden');
            document.getElementById('dashboard-master-content').classList.remove('hidden');
            caricaDati();
        }

        async function caricaDati() {
            const risp = await fetch('/api/inventario');
            cacheInventario = await risp.json();
            costruisciListaMaster(cacheInventario);
        }

        function esciMaster() { localStorage.removeItem('master_autenticato'); window.location.reload(); }

        // [LOGICA ELIMINAZIONE ORDINE]
        async function eliminaOrdine(modello, ordineId) {
            const password = prompt("⚠️ ATTENZIONE: Inserisci la Password Master per eliminare l'ordine e ripristinare la scorta:");
            if (!password) return;

            const response = await fetch('/api/master/elimina-ordine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ modello, ordineId, password })
            });

            if (response.ok) {
                alert("Ordine eliminato con successo!");
                caricaDati(); // Ricarica inventario
            } else {
                const data = await response.json();
                alert("Errore: " + (data.errore || "Operazione non riuscita"));
            }
        }

        // [RENDER TABELLA ORDINI]
        function apriListaClienti() {
            const pr = cacheInventario[modelloCorrente];
            document.getElementById('modal-nome-prodotto').innerText = pr.nome;
            const corpo = document.getElementById('lista-clienti-corpo');
            corpo.innerHTML = "";

            pr.ordiniClienti.forEach(ordine => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="py-3 text-center"><input type="checkbox" ${ordine.spedito ? 'checked' : ''} onclick="cambiaStatoSpedito('${ordine.id}', this.checked)"></td>
                    <td class="py-3 font-semibold">${ordine.cliente}</td>
                    <td class="py-3 text-center text-cyan-400 font-bold">${ordine.quantita}</td>
                    <td class="py-3 text-center">${ordine.agente}</td>
                    <td class="py-3 text-right text-[10px]">${ordine.giorno} ${ordine.ora}</td>
                    <td class="py-3 text-center">
                        <button onclick="eliminaOrdine('${modelloCorrente}', '${ordine.id}')" class="text-red-500 hover:text-red-300 font-bold text-xs px-2 py-1 bg-red-950/30 rounded border border-red-900">Elimina</button>
                    </td>
                `;
                corpo.appendChild(tr);
            });
            document.getElementById('modal-clienti').classList.remove('hidden');
        }

        // ... (Mantenere le altre funzioni esistenti come costruisciListaMaster, cambiaStatoSpedito, etc.)
        function chiudiModal() { document.getElementById('modal-clienti').classList.add('hidden'); }
        
        socket.on('aggiorna_magazzino', (nuovoInventario) => {
            cacheInventario = nuovoInventario;
            if(document.getElementById('dashboard-master-content').classList.contains('hidden') === false) {
                costruisciListaMaster(nuovoInventario);
                if(!document.getElementById('modal-clienti').classList.contains('hidden')) apriListaClienti();
            }
        });
        
        // [Incollare qui le tue funzioni rimanenti: costruisciListaMaster, cambiaStatoSpedito, aggiornaScorte, etc.]
    </script>
</body>
</html>
